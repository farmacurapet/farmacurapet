<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Farmácia Veterinária Solidária</title>

<style>
body { font-family: Arial; margin: 0; background: #f4f4f4; }

.header {
    background: #2e7d32;
    color: white;
    text-align: center;
    padding: 15px;
}

.container {
    width: 90%;
    max-width: 420px;
    margin: auto;
    background: white;
    padding: 20px;
    margin-top: 20px;
    border-radius: 10px;
}

input, select {
    width: 100%;
    padding: 10px;
    margin: 5px 0;
}

button {
    width: 100%;
    padding: 10px;
    background: #2e7d32;
    color: white;
    border: none;
}

.item {
    background: #eee;
    margin: 5px 0;
    padding: 10px;
    border-radius: 8px;
}

.item img {
    width: 100%;
    margin-top: 5px;
}

.link {
    display: block;
    margin-top: 10px;
    text-align: center;
    cursor: pointer;
    color: green;
}

.input-group { position: relative; }
.input-group span {
    position: absolute;
    right: 10px;
    top: 10px;
    cursor: pointer;
}

.ads {
    margin-top: 15px;
    text-align: center;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="header">Farmácia Veterinária Solidária 🐾</div>

<div class="container" id="loginDiv">
<h2>Login</h2>
<input type="email" id="email">
<div class="input-group">
<input type="password" id="senha">
<span onclick="toggleSenha('senha')">👁️</span>
</div>
<button onclick="login()">Entrar</button>
<p id="erroLogin"></p>

<span class="link" onclick="mostrarCadastro()">Criar conta</span>
<span class="link" onclick="esqueciSenha()">Esqueci a senha</span>
</div>

<div class="container" id="cadastroDiv" style="display:none;">
<h2>Cadastro</h2>
<input type="email" id="novoEmail">
<div class="input-group">
<input type="password" id="novaSenha">
<span onclick="toggleSenha('novaSenha')">👁️</span>
</div>
<input type="text" id="whatsapp">
<select id="tipoUsuario">
<option value="doador">Doador</option>
<option value="receptor">Receptor</option>
</select>
<button onclick="cadastrar()">Cadastrar</button>
<button onclick="voltarLogin()">Voltar</button>
</div>

<div class="container" id="sistemaDiv" style="display:none;">

<h3>Medicamentos Disponíveis</h3>
<div id="listaEstoque"></div>

<h3>Solicitações Recebidas</h3>
<div id="solicitacoes"></div>

<div id="areaDoador" style="display:none;">
<input type="text" id="nomeMed" placeholder="Nome do medicamento">
<input type="date" id="dataValidade">
<input type="file" id="fotoMed">
<button onclick="doar()">Adicionar</button>
</div>

<div id="areaReceptor" style="display:none;">
<input type="text" id="buscaMed" placeholder="Buscar medicamento">
<button onclick="buscar()">Buscar</button>
<div id="resultado"></div>
</div>

<button onclick="logout()">Sair</button>

<div class="ads" id="painelInfo"></div>

</div>

<script>
let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];
let estoque = JSON.parse(localStorage.getItem("estoque")) || [];
let solicitacoes = JSON.parse(localStorage.getItem("solicitacoes")) || [];
let usuarioLogado = null;

function toggleSenha(id){
    let c=document.getElementById(id);
    c.type=c.type==="password"?"text":"password";
}

function mostrarCadastro(){
    loginDiv.style.display="none";
    cadastroDiv.style.display="block";
}

function voltarLogin(){
    cadastroDiv.style.display="none";
    loginDiv.style.display="block";
}

function cadastrar(){
    let email=novoEmail.value;
    let senha=novaSenha.value;
    let tipo=tipoUsuario.value;
    let zap=whatsapp.value;

    if(!email||!senha||!zap) return alert("Preencha tudo");

    if(usuarios.find(u=>u.email===email)) return alert("Já existe");

    usuarios.push({email,senha,tipo,zap});
    localStorage.setItem("usuarios",JSON.stringify(usuarios));
    alert("Cadastrado!");
    voltarLogin();
}

function login(){
    let email=document.getElementById("email").value;
    let senha=document.getElementById("senha").value;

    let user=usuarios.find(u=>u.email===email && u.senha===senha);
    if(!user) return erroLogin.innerText="Erro no login";

    usuarioLogado=user;

    loginDiv.style.display="none";
    sistemaDiv.style.display="block";

    atualizarEstoque();
    atualizarSolicitacoes();

    if(user.tipo==="doador") areaDoador.style.display="block";
    else areaReceptor.style.display="block";
}

function esqueciSenha(){
    let email=prompt("Digite seu email:");
    let u=usuarios.find(x=>x.email===email);
    if(u) alert("Sua senha é: "+u.senha);
    else alert("Email não encontrado");
}

function doar(){
    let nome=nomeMed.value;
    let data=dataValidade.value;
    let file=fotoMed.files[0];

    if(!nome||!data||!file) return alert("Preencha tudo");

    let reader=new FileReader();

    reader.onload=function(e){
        estoque.push({
            id:Date.now(),
            nome,
            data,
            foto:e.target.result,
            doador:usuarioLogado.email
        });

        localStorage.setItem("estoque",JSON.stringify(estoque));
        atualizarEstoque();
    };

    reader.readAsDataURL(file);
}

function atualizarEstoque(){
    listaEstoque.innerHTML="";

    estoque.forEach(m=>{
        listaEstoque.innerHTML+=`
        <div class="item">
            <b>${m.nome}</b><br>
            Data de validade do medicamento: ${m.data}
            <img src="${m.foto}">
            <button onclick="interesse(${m.id})">Quero esse</button>
        </div>`;
    });
}

function interesse(id){
    solicitacoes.push({
        medId:id,
        receptor:usuarioLogado.email,
        status:"pendente"
    });

    localStorage.setItem("solicitacoes",JSON.stringify(solicitacoes));
    alert("Solicitação enviada!");
    atualizarSolicitacoes();
}

function atualizarSolicitacoes(){
    solicitacoes.innerHTML="";
    document.getElementById("solicitacoes").innerHTML="";

    solicitacoes.forEach(s=>{
        let med=estoque.find(m=>m.id===s.medId);

        if(med && med.doador===usuarioLogado.email && s.status==="pendente"){
            document.getElementById("solicitacoes").innerHTML+=`
            <div class="item">
                Pedido de ${s.receptor} para ${med.nome}
                <button onclick="confirmar(${s.medId})">Confirmar doação</button>
            </div>`;
        }
    });
}

function confirmar(id){
    estoque = estoque.filter(m=>m.id!==id);
    localStorage.setItem("estoque",JSON.stringify(estoque));

    solicitacoes = solicitacoes.map(s=>{
        if(s.medId===id) s.status="concluido";
        return s;
    });

    localStorage.setItem("solicitacoes",JSON.stringify(solicitacoes));

    atualizarEstoque();
    atualizarSolicitacoes();
    alert("Doação concluída!");
}

function buscar(){
    let busca=buscaMed.value.toLowerCase();
    resultado.innerHTML="";

    estoque.filter(m=>m.nome.toLowerCase().includes(busca))
    .forEach(m=>{
        resultado.innerHTML+=`
        <div class="item">
            ${m.nome}
            <button onclick="interesse(${m.id})">Solicitar</button>
        </div>`;
    });
}

function logout(){
    location.reload();
}

let infos = [
    {texto:"🏥 Hospital Veterinário do Recife - Telefone: (8140423034)",cor:"#1b5e20"},
    {texto:"🏥 Hospital Veterinário da UFRPE - Telefone: (8133206411)",cor:"#0d47a1"},
    {texto:"💉 Campanha de vacinação antirrábica em andamento no Recife.",cor:"#2e7d32"},
    {texto:"🐶 Atenção a doenças em pets.",cor:"#c62828"},
    {texto:"🌧️ Possibilidade de chuvas hoje.",cor:"#6a1b9a"},
    {texto:"🐱 Campanha de castração em breve.",cor:"#00897b"}
];

let i=0;

function trocarInfo(){
    let box=document.getElementById("painelInfo");
    box.innerHTML=infos[i].texto;
    box.style.background=infos[i].cor;
    box.style.color="white";
    box.style.padding="15px";
    box.style.borderRadius="10px";

    i=(i+1)%infos.length;
}

setInterval(trocarInfo,4000);
trocarInfo();
</script>

</body>
</html>
