<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Farmácia Veterinária Solidária</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: linear-gradient(#e8f5e9, #ffffff);
}

.header {
    background: #2e7d32;
    color: white;
    text-align: center;
    padding: 15px;
}

.container {
    width: 90%;
    max-width: 420px;
    margin: auto;
    background: white;
    padding: 20px;
    margin-top: 20px;
    border-radius: 10px;
}

label {
    font-weight: bold;
    display: block;
    margin-top: 10px;
}

input, select {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
}

button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    background: #2e7d32;
    color: white;
    border: none;
    cursor: pointer;
}

button:active {
    background: #1b5e20;
}

.loading {
    background: gray !important;
}

.item {
    background: #eee;
    margin: 10px 0;
    padding: 10px;
    border-radius: 8px;
}

.item img {
    width: 100%;
    margin-top: 5px;
}

.banner {
    margin-top: 15px;
    padding: 15px;
    border-radius: 10px;
    color: white;
    text-align: center;
}
</style>
</head>

<body>

<div class="header">Farmácia Veterinária Solidária 🐾</div>

<div class="container" id="loginDiv">
<h2>Login</h2>

<label>Email</label>
<input type="email" id="email">

<label>Senha</label>
<input type="password" id="senha">

<button id="btnLogin" onclick="login()">Entrar</button>
<p id="erroLogin"></p>

<button onclick="mostrarCadastro()">Criar conta</button>
</div>

<div class="container" id="cadastroDiv" style="display:none;">
<h2>Cadastro</h2>

<label>Email</label>
<input type="email" id="novoEmail">

<label>Senha</label>
<input type="password" id="novaSenha">

<label>WhatsApp</label>
<input type="text" id="whatsapp" placeholder="Ex: 81999999999">

<label>Tipo de usuário</label>
<select id="tipoUsuario">
<option value="doador">Doador</option>
<option value="receptor">Receptor</option>
</select>

<button id="btnCadastro" onclick="cadastrar()">Cadastrar</button>
<button onclick="voltarLogin()">Voltar</button>
</div>

<div class="container" id="sistemaDiv" style="display:none;">

<h3>Medicamentos Disponíveis</h3>
<div id="listaEstoque"></div>

<div id="areaDoador" style="display:none;">
<h3>Adicionar Medicamento</h3>

<label>Nome do medicamento</label>
<input type="text" id="nomeMed">

<label>Data de validade do medicamento</label>
<input type="date" id="dataValidade">

<label>Foto do medicamento</label>
<input type="file" id="fotoMed">

<button onclick="doar()">Salvar</button>
</div>

<button onclick="logout()">Sair</button>

<div id="banner" class="banner"></div>

</div>

<script>
let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];
let estoque = JSON.parse(localStorage.getItem("estoque")) || [];
let usuarioLogado = JSON.parse(localStorage.getItem("sessao")) || null;

/* manter login */
if(usuarioLogado){
    loginDiv.style.display="none";
    sistemaDiv.style.display="block";
    carregarSistema();
}

function login(){
    let btn = document.getElementById("btnLogin");
    btn.classList.add("loading");
    btn.innerText="Entrando...";

    setTimeout(()=>{
        let user=usuarios.find(u=>u.email===email.value && u.senha===senha.value);

        if(!user){
            erroLogin.innerText="Email ou senha incorretos";
            btn.classList.remove("loading");
            btn.innerText="Entrar";
            return;
        }

        usuarioLogado=user;
        localStorage.setItem("sessao",JSON.stringify(user));

        loginDiv.style.display="none";
        sistemaDiv.style.display="block";
        carregarSistema();
    },800);
}

function cadastrar(){
    let btn = document.getElementById("btnCadastro");
    btn.classList.add("loading");
    btn.innerText="Salvando...";

    setTimeout(()=>{
        let emailVal=novoEmail.value;
        let senhaVal=novaSenha.value;
        let zap=whatsapp.value;
        let tipo=tipoUsuario.value;

        if(!emailVal || !senhaVal || !zap){
            alert("Preencha todos os campos");
            btn.classList.remove("loading");
            btn.innerText="Cadastrar";
            return;
        }

        usuarios.push({email:emailVal, senha:senhaVal, zap, tipo});
        localStorage.setItem("usuarios",JSON.stringify(usuarios));

        alert("Cadastro realizado!");
        btn.classList.remove("loading");
        btn.innerText="Cadastrar";
        voltarLogin();
    },800);
}

function carregarSistema(){
    atualizarEstoque();
    if(usuarioLogado.tipo==="doador") areaDoador.style.display="block";
    atualizarBanner();
}

function doar(){
    let reader=new FileReader();

    reader.onload=function(e){
        estoque.push({
            nome:nomeMed.value,
            data:dataValidade.value,
            foto:e.target.result,
            zap:usuarioLogado.zap
        });

        localStorage.setItem("estoque",JSON.stringify(estoque));
        atualizarEstoque();
    };

    reader.readAsDataURL(fotoMed.files[0]);
}

function atualizarEstoque(){
    listaEstoque.innerHTML="";
    estoque.forEach(m=>{
        listaEstoque.innerHTML+=`
        <div class="item">
            <b>${m.nome}</b><br>
            Validade: ${m.data}
            <img src="${m.foto}">
            <a href="https://wa.me/55${m.zap}" target="_blank">📲 Contato WhatsApp</a>
        </div>`;
    });
}

function logout(){
    localStorage.removeItem("sessao");
    location.reload();
}

/* banner */
let banners = [
    {texto:"💉 Vacinação gratuita disponível", cor:"#2e7d32"},
    {texto:"📞 Hospital Vet Recife: (81) 4042-3034", cor:"#1565c0"},
    {texto:"📞 Hospital Vet UFRPE: (81) 3320-6411", cor:"#6a1b9a"}
];

let i=0;

function atualizarBanner(){
    let b=document.getElementById("banner");
    b.innerHTML = banners[i].texto;
    b.style.background = banners[i].cor;
    i=(i+1)%banners.length;
}

setInterval(atualizarBanner,4000);

function mostrarCadastro(){
    loginDiv.style.display="none";
    cadastroDiv.style.display="block";
}

function voltarLogin(){
    cadastroDiv.style.display="none";
    loginDiv.style.display="block";
}
</script>

</body>
</html>
