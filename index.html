<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FarmacuraPet Oficial</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f4f7; margin: 0; padding: 0; }
        .barra-admin { background: #fff9c4; color: #856404; text-align: center; padding: 10px; font-weight: bold; border-bottom: 1px solid #ffeeba; }
        header { background: #2D9CDB; color: white; padding: 20px; text-align: center; font-size: 24px; font-weight: bold; }
        .container { max-width: 400px; margin: 30px auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #2D9CDB; text-align: center; margin-top: 0; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .btn-azul { background-color: #2D9CDB; }
        .btn-verde { background-color: #27AE60; }
        .link-acao { display: block; text-align: center; margin-top: 15px; color: #2D9CDB; text-decoration: none; cursor: pointer; font-size: 14px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="barra-admin">📢 ESPAÇO PUBLICITÁRIO: ANUNCIE AQUI SEU PET SHOP!</div>

<header>🐾 FarmacuraPet</header>

<div class="container">
    
    <div id="telaLogin">
        <h2>Entrar</h2>
        <input type="email" id="emailLogin" placeholder="Seu e-mail">
        <input type="password" id="senhaLogin" placeholder="Sua senha">
        
        <button class="btn btn-azul" onclick="entrarSistema()">ACESSAR</button>
        
        <a class="link-acao" onclick="recuperarSenha()">Esqueci minha senha</a>
        <a class="link-acao" onclick="mostrarCadastro()">Não tenho conta? Cadastre-se</a>
    </div>

    <div id="telaCadastro" class="hidden">
        <h2>Nova Conta</h2>
        <input type="email" id="emailNovo" placeholder="E-mail para cadastro">
        <input type="password" id="senhaNova" placeholder="Senha (mín. 6 dígitos)">
        
        <button class="btn btn-verde" onclick="cadastrarUsuario()">CRIAR CONTA</button>
        
        <a class="link-acao" onclick="mostrarLogin()">Já tenho conta. Voltar</a>
    </div>

    <div id="telaApp" class="hidden">
        <h2 id="tituloApp">Enviar Doação</h2>
        
        <input type="text" id="nomeMed" placeholder="Nome do Medicamento">
        <input type="tel" id="whatsZap" placeholder="Seu WhatsApp">
        
        <label style="font-size: 12px; font-weight: bold;">Foto da Receita/Remédio:</label>
        <input type="file" id="fotoArquivo" accept="image/*">
        
        <label style="font-size: 12px; font-weight: bold;">Data de Validade:</label>
        <input type="date" id="dataVal">
        
        <button class="btn btn-verde" onclick="salvarDadosNoBanco()">SALVAR REGISTRO</button>
        
        <a class="link-acao" style="color: red;" onclick="location.reload()">Sair com segurança</a>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    // Configurações do Supabase
    const URL_SUPA = "https://tkupfowbgykjjdkwfiyr.supabase.co";
    const KEY_SUPA = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrdXBmb3diZ3lrampka3dmaXlyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNjY1OTgsImV4cCI6MjA5MTk0MjU5OH0.yXCbccFrPB9qyVamthjAUdyrK0bqWfbRCG3LR4VAjBY";
    
    // Inicializa o cliente
    const supabase = window.supabase.createClient(URL_SUPA, KEY_SUPA);

    // Funções de Troca de Tela
    function mostrarCadastro() {
        document.getElementById('telaLogin').classList.add('hidden');
        document.getElementById('telaCadastro').classList.remove('hidden');
    }

    function mostrarLogin() {
        document.getElementById('telaCadastro').classList.add('hidden');
        document.getElementById('telaLogin').classList.remove('hidden');
    }

    // --- AÇÕES DO SISTEMA ---

    async function entrarSistema() {
        const email = document.getElementById('emailLogin').value;
        const password = document.getElementById('senhaLogin').value;

        if(!email || !password) {
            alert("Preencha e-mail e senha!");
            return;
        }

        const { data, error } = await supabase.auth.signInWithPassword({ email, password });

        if (error) {
            alert("Erro no Login: " + error.message);
        } else {
            alert("Bem-vindo ao FarmacuraPet!");
            document.getElementById('telaLogin').classList.add('hidden');
            document.getElementById('telaApp').classList.remove('hidden');
        }
    }

    async function cadastrarUsuario() {
        const email = document.getElementById('emailNovo').value;
        const password = document.getElementById('senhaNova').value;

        const { error } = await supabase.auth.signUp({ email, password });

        if (error) {
            alert("Erro no Cadastro: " + error.message);
        } else {
            alert("Conta criada! Verifique seu e-mail para confirmar.");
            mostrarLogin();
        }
    }

    async function recuperarSenha() {
        const email = document.getElementById('emailLogin').value;
        if (!email) {
            alert("Digite seu e-mail no campo para recuperar a senha.");
            return;
        }

        const { error } = await supabase.auth.resetPasswordForEmail(email);

        if (error) {
            alert("Erro: " + error.message);
        } else {
            alert("Link de recuperação enviado para seu e-mail!");
        }
    }

    async function salvarDadosNoBanco() {
        const med = document.getElementById('nomeMed').value;
        const zap = document.getElementById('whatsZap').value;
        const validade = document.getElementById('dataVal').value;

        if (!med || !zap) {
            alert("Preencha o nome do remédio e seu contato!");
            return;
        }

        const { error } = await supabase.from('registros').insert([{
            medicamento: med,
            whatsapp: zap,
            validade_data: validade
        }]);

        if (error) {
            alert("Erro ao salvar no banco: " + error.message);
        } else {
            alert("✅ Sucesso! Medicamento registrado.");
            location.reload();
        }
    }
</script>
</body>
</html>
