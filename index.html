<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmacura Pet - Sistema</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #1e3c72;
            --accent: #28a745;
            --danger: #d32f2f;
            --side-bg: #ffffff;
            --body-bg: #f4f7f6;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        body { 
            background-color: var(--body-bg); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
        }

        .card-admin {
            background: var(--side-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }

        h2 { color: var(--primary); margin-bottom: 1.5rem; text-align: center; }
        .form-group { margin-bottom: 1rem; position: relative; }
        label { display: block; margin-bottom: 5px; color: #555; font-size: 0.9rem; }

        input {
            width: 100%;
            padding: 12px;
            padding-right: 40px;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 35px;
            cursor: pointer;
            color: #888;
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 1rem;
        }

        .btn-secondary {
            background: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
            margin-top: 0.5rem;
        }

        .status-msg {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.85rem;
            font-weight: bold;
        }

        /* Esconder seções */
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="loginSection" class="card-admin">
    <h2><i class="fas fa-lock"></i> Login Pet</h2>
    <form id="loginForm">
        <div class="form-group">
            <label>E-mail</label>
            <input type="email" id="loginEmail" placeholder="seu@email.com" required>
        </div>
        <div class="form-group">
            <label>Senha</label>
            <input type="password" id="loginPass" placeholder="Sua senha" required>
            <i class="fa-solid fa-eye toggle-password" onclick="toggleView('loginPass', this)"></i>
        </div>
        <button type="submit" class="btn-submit">ENTRAR</button>
        <p style="text-align:center; font-size: 0.8rem; margin-top: 10px;">
            Não tem conta? <a href="#" onclick="showSection('adminSection')">Cadastre aqui</a>
        </p>
    </form>
    <div id="loginMsg" class="status-msg"></div>
</div>

<div id="adminSection" class="card-admin hidden">
    <h2><i class="fas fa-paw"></i> Gerenciar Acesso</h2>
    <form id="adminForm">
        <div class="form-group">
            <label>Novo E-mail</label>
            <input type="email" id="adminEmail" placeholder="novo@email.com" required>
        </div>
        <div class="form-group">
            <label>Nova Senha</label>
            <input type="password" id="adminPass" placeholder="Mínimo 6 caracteres" required>
            <i class="fa-solid fa-eye toggle-password" onclick="toggleView('adminPass', this)"></i>
        </div>
        <button type="submit" class="btn-submit">SALVAR / ATUALIZAR</button>
        <button type="button" class="btn-submit btn-secondary" onclick="showSection('loginSection')">VOLTAR AO LOGIN</button>
    </form>
    <div id="adminMsg" class="status-msg"></div>
</div>

<script>
    // --- FUNÇÕES DE NAVEGAÇÃO ---
    function showSection(id) {
        document.getElementById('loginSection').classList.add('hidden');
        document.getElementById('adminSection').classList.add('hidden');
        document.getElementById(id).classList.remove('hidden');
    }

    function toggleView(inputId, icon) {
        const input = document.getElementById(inputId);
        const isPass = input.type === 'password';
        input.type = isPass ? 'text' : 'password';
        icon.classList.toggle('fa-eye');
        icon.classList.toggle('fa-eye-slash');
    }

    // --- LÓGICA DE LOGIN ---
    document.getElementById('loginForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value;
        const pass = document.getElementById('loginPass').value;
        const msg = document.getElementById('loginMsg');

        // Busca o que está salvo
        const savedEmail = localStorage.getItem('pet_admin_email');
        const savedPass = localStorage.getItem('pet_admin_pass');

        if (email === savedEmail && pass === savedPass) {
            msg.style.color = "var(--accent)";
            msg.innerText = "Login realizado! Redirecionando...";
            // Aqui você redirecionaria para a sua Dashboard real
            setTimeout(() => alert("Bem-vindo ao Painel Farmacura!"), 1000);
        } else {
            msg.style.color = "var(--danger)";
            msg.innerText = "E-mail ou senha incorretos!";
        }
    });

    // --- LÓGICA DE CADASTRO/ATUALIZAÇÃO ---
    document.getElementById('adminForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const email = document.getElementById('adminEmail').value;
        const pass = document.getElementById('adminPass').value;
        const msg = document.getElementById('adminMsg');

        // Salva os dados para serem usados no login depois
        localStorage.setItem('pet_admin_email', email);
        localStorage.setItem('pet_admin_pass', pass);

        msg.style.color = "var(--accent)";
        msg.innerText = "Dados atualizados! Use-os para logar agora.";
        
        setTimeout(() => showSection('loginSection'), 2000);
    });

    // Ao carregar, verifica se já existe cadastro. Se não, manda para o cadastro.
    window.onload = () => {
        if (!localStorage.getItem('pet_admin_email')) {
            showSection('adminSection');
        }
    };
</script>

</body>
</html>
