<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmacura Pet - Sistema Administrativo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #1e3c72;
            --accent: #28a745;
            --danger: #d32f2f;
            --white: #ffffff;
            --body-bg: #f4f7f6;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        
        body { 
            background-color: var(--body-bg); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }

        .card {
            background: var(--white);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }

        /* Estilo especial para o Painel (mais largo) */
        #dashboardPage.card { max-width: 800px; width: 90%; }

        h2 { color: var(--primary); margin-bottom: 1.5rem; text-align: center; }
        .form-group { margin-bottom: 1.2rem; position: relative; }
        label { display: block; margin-bottom: 5px; color: #555; font-weight: 600; }

        input {
            width: 100%;
            padding: 12px;
            padding-right: 40px;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
            font-size: 1rem;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 38px;
            cursor: pointer;
            color: #888;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: 0.3s;
            text-align: center;
        }

        .btn-primary { background: var(--primary); color: white; margin-top: 10px; }
        .btn-outline { background: transparent; border: 1px solid var(--primary); color: var(--primary); margin-top: 15px; }
        .btn-danger { background: var(--danger); color: white; margin-top: 20px; width: auto; padding: 8px 20px; }
        .btn:hover { opacity: 0.85; }

        .status-msg { text-align: center; margin-top: 1rem; font-weight: bold; min-height: 20px; }
        
        .hidden { display: none !important; }

        .welcome-box { text-align: center; padding: 20px; }
    </style>
</head>
<body>

    <div id="loginPage" class="card">
        <h2><i class="fas fa-lock"></i> Login Admin</h2>
        <form id="formLogin">
            <div class="form-group">
                <label>E-mail</label>
                <input type="email" id="userEmail" placeholder="Digite seu e-mail" required>
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="userPass" placeholder="Digite sua senha" required>
                <i class="fa-solid fa-eye toggle-password" onclick="togglePassword('userPass', this)"></i>
            </div>
            <button type="submit" class="btn btn-primary">ENTRAR NO SISTEMA</button>
        </form>
        <button class="btn btn-outline" onclick="mudarTela('registerPage')">CADASTRAR / ATUALIZAR CONTA</button>
        <div id="loginMsg" class="status-msg"></div>
    </div>

    <div id="registerPage" class="card hidden">
        <h2><i class="fas fa-user-plus"></i> Configurar Acesso</h2>
        <form id="formRegister">
            <div class="form-group">
                <label>Definir E-mail</label>
                <input type="email" id="regEmail" placeholder="novo@email.com" required>
            </div>
            <div class="form-group">
                <label>Definir Senha</label>
                <input type="password" id="regPass" placeholder="Crie uma senha forte" required>
                <i class="fa-solid fa-eye toggle-password" onclick="togglePassword('regPass', this)"></i>
            </div>
            <button type="submit" class="btn btn-primary">SALVAR DADOS</button>
        </form>
        <button class="btn btn-outline" onclick="mudarTela('loginPage')">VOLTAR PARA LOGIN</button>
        <div id="regMsg" class="status-msg"></div>
    </div>

    <div id="dashboardPage" class="card hidden">
        <div class="welcome-box">
            <h2><i class="fas fa-chart-line"></i> Painel Farmacura Pet</h2>
            <p>Bem-vindo ao sistema de gerenciamento administrativo.</p>
            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
            
            <div style="background: #e9ecef; padding: 40px; border-radius: 8px;">
                <p>O conteúdo do seu sistema aparecerá nesta área.</p>
            </div>

            <button class="btn btn-danger" onclick="logout()">SAIR / LOGOUT</button>
        </div>
    </div>

<script>
    function mudarTela(idTela) {
        document.getElementById('loginPage').classList.add('hidden');
        document.getElementById('registerPage').classList.add('hidden');
        document.getElementById('dashboardPage').classList.add('hidden');
        
        document.getElementById(idTela).classList.remove('hidden');
    }

    function togglePassword(inputId, icon) {
        const input = document.getElementById(inputId);
        if (input.type === "password") {
            input.type = "text";
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            input.type = "password";
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }

    // SALVAR CADASTRO
    document.getElementById('formRegister').addEventListener('submit', function(e) {
        e.preventDefault();
        localStorage.setItem('admin_user', document.getElementById('regEmail').value);
        localStorage.setItem('admin_password', document.getElementById('regPass').value);

        const msg = document.getElementById('regMsg');
        msg.style.color = "var(--accent)";
        msg.innerText = "Configuração salva com sucesso!";
        setTimeout(() => mudarTela('loginPage'), 1200);
    });

    // LOGAR
    document.getElementById('formLogin').addEventListener('submit', function(e) {
        e.preventDefault();
        const emailDigitado = document.getElementById('userEmail').value;
        const senhaDigitada = document.getElementById('userPass').value;
        const emailSalvo = localStorage.getItem('admin_user');
        const senhaSalva = localStorage.getItem('admin_password');

        if (emailDigitado === emailSalvo && senhaDigitada === senhaSalva) {
            mudarTela('dashboardPage'); // <-- ISSO FAZ O LOGIN ACONTECER
        } else {
            const msg = document.getElementById('loginMsg');
            msg.style.color = "var(--danger)";
            msg.innerText = "E-mail ou senha incorretos.";
        }
    });

    function logout() {
        document.getElementById('userPass').value = ""; // Limpa a senha por segurança
        mudarTela('loginPage');
    }

    window.onload = () => {
        if (!localStorage.getItem('admin_user')) {
            mudarTela('registerPage');
        }
    };
</script>

</body>
</html>
