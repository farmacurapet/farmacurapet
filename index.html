<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmacura Pet - Sistema Administrativo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #1e3c72;
            --accent: #28a745;
            --danger: #d32f2f;
            --white: #ffffff;
            --body-bg: #f4f7f6;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        
        body { 
            background-color: var(--body-bg); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
        }

        .card {
            background: var(--white);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }

        h2 { color: var(--primary); margin-bottom: 1.5rem; text-align: center; }
        .form-group { margin-bottom: 1.2rem; position: relative; }
        label { display: block; margin-bottom: 5px; color: #555; font-weight: 600; }

        input {
            width: 100%;
            padding: 12px;
            padding-right: 40px;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
            font-size: 1rem;
        }

        /* Estilo do Olhinho */
        .toggle-password {
            position: absolute;
            right: 12px;
            top: 38px;
            cursor: pointer;
            color: #888;
            font-size: 1.1rem;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: 0.3s;
        }

        .btn-primary { background: var(--primary); color: white; margin-top: 10px; }
        .btn-outline { background: transparent; border: 1px solid var(--primary); color: var(--primary); margin-top: 15px; }
        .btn:hover { opacity: 0.85; }

        .status-msg { text-align: center; margin-top: 1rem; font-weight: bold; min-height: 20px; }
        
        /* Controle de exibição das telas */
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="loginPage" class="card">
        <h2><i class="fas fa-lock"></i> Login Admin</h2>
        <form id="formLogin">
            <div class="form-group">
                <label>E-mail</label>
                <input type="email" id="userEmail" placeholder="Digite seu e-mail" required>
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="userPass" placeholder="Digite sua senha" required>
                <i class="fa-solid fa-eye toggle-password" onclick="togglePassword('userPass', this)"></i>
            </div>
            <button type="submit" class="btn btn-primary">ENTRAR NO SISTEMA</button>
        </form>
        <button class="btn btn-outline" onclick="mudarTela('registerPage')">CADASTRAR / ATUALIZAR CONTA</button>
        <div id="loginMsg" class="status-msg"></div>
    </div>

    <div id="registerPage" class="card hidden">
        <h2><i class="fas fa-user-plus"></i> Configurar Acesso</h2>
        <form id="formRegister">
            <div class="form-group">
                <label>Definir E-mail</label>
                <input type="email" id="regEmail" placeholder="novo@email.com" required>
            </div>
            <div class="form-group">
                <label>Definir Senha</label>
                <input type="password" id="regPass" placeholder="Crie uma senha forte" required>
                <i class="fa-solid fa-eye toggle-password" onclick="togglePassword('regPass', this)"></i>
            </div>
            <button type="submit" class="btn btn-primary">SALVAR DADOS</button>
        </form>
        <button class="btn btn-outline" onclick="mudarTela('loginPage')">VOLTAR PARA LOGIN</button>
        <div id="regMsg" class="status-msg"></div>
    </div>

<script>
    // 1. Função para trocar de tela
    function mudarTela(idTela) {
        document.getElementById('loginPage').classList.add('hidden');
        document.getElementById('registerPage').classList.add('hidden');
        document.getElementById(idTela).classList.remove('hidden');
        
        // Limpa mensagens de erro ao trocar
        document.getElementById('loginMsg').innerText = "";
        document.getElementById('regMsg').innerText = "";
    }

    // 2. Função do Olhinho (Ver Senha)
    function togglePassword(inputId, icon) {
        const input = document.getElementById(inputId);
        if (input.type === "password") {
            input.type = "text";
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            input.type = "password";
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }

    // 3. Salvar Cadastro (Atualizar)
    document.getElementById('formRegister').addEventListener('submit', function(e) {
        e.preventDefault();
        const email = document.getElementById('regEmail').value;
        const pass = document.getElementById('regPass').value;
        
        // Salva permanentemente no navegador
        localStorage.setItem('admin_user', email);
        localStorage.setItem('admin_password', pass);

        const msg = document.getElementById('regMsg');
        msg.style.color = "var(--accent)";
        msg.innerText = "Dados salvos! Redirecionando...";

        setTimeout(() => mudarTela('loginPage'), 1500);
    });

    // 4. Lógica de Login
    document.getElementById('formLogin').addEventListener('submit', function(e) {
        e.preventDefault();
        const emailDigitado = document.getElementById('userEmail').value;
        const senhaDigitada = document.getElementById('userPass').value;
        
        const emailSalvo = localStorage.getItem('admin_user');
        const senhaSalva = localStorage.getItem('admin_password');

        const msg = document.getElementById('loginMsg');

        if (emailDigitado === emailSalvo && senhaDigitada === senhaSalva) {
            msg.style.color = "var(--accent)";
            msg.innerText = "Acesso autorizado! Bem-vindo.";
            // Aqui você colocaria o link para sua página principal, ex:
            // window.location.href = "dashboard.html";
        } else {
            msg.style.color = "var(--danger)";
            msg.innerText = "Usuário ou senha não encontrados.";
        }
    });

    // Início: Se não houver nada salvo, sugere o cadastro
    window.onload = () => {
        if (!localStorage.getItem('admin_user')) {
            mudarTela('registerPage');
            document.getElementById('regMsg').innerText = "Crie seu primeiro acesso.";
            document.getElementById('regMsg').style.color = "var(--primary)";
        }
    };
</script>

</body>
</html>
