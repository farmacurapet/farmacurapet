<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FarmacuraPet | Solidariedade Animal</title>
    <style>
        :root {
            --primaria: #00acc1;
            --primaria-dark: #007c91;
            --secundaria: #43a047;
            --fundo: #f0f7f8;
            --branco: #ffffff;
            --texto: #37474f;
            --sombra: 0 10px 30px rgba(0,0,0,0.08);
        }

        body { 
            font-family: 'Poppins', 'Segoe UI', sans-serif; 
            margin: 0; 
            background-color: var(--fundo); 
            color: var(--texto);
            line-height: 1.6;
        }

        header { 
            background: var(--branco); 
            padding: 15px 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--primaria);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .hero {
            background: linear-gradient(135deg, var(--primaria), var(--primaria-dark));
            color: white;
            padding: 60px 5% 120px;
            text-align: center;
        }

        .hero h1 { margin: 0; font-size: 2.2rem; }
        .hero p { opacity: 0.9; font-size: 1.1rem; max-width: 600px; margin: 10px auto; }

        .main-container { 
            max-width: 500px; 
            width: 90%;
            margin: -80px auto 40px; 
            background: var(--branco); 
            padding: 40px; 
            border-radius: 24px; 
            box-shadow: var(--sombra);
            position: relative;
        }

        .ad-banner {
            width: 100%;
            margin: 20px 0;
            background: #f8f9fa;
            border: 2px dashed #e0e0e0;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 90px;
            color: #adb5bd;
            font-size: 0.75rem;
            text-align: center;
        }

        .tabs { 
            display: flex; 
            background: #f1f3f4; 
            padding: 5px; 
            border-radius: 15px; 
            margin-bottom: 30px; 
        }
        .tab-btn { 
            flex: 1; padding: 12px; border: none; border-radius: 12px; 
            cursor: pointer; font-weight: 600; background: transparent; 
            transition: 0.4s; color: #78909c;
        }
        .tab-btn.active { background: var(--branco); color: var(--primaria); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .tab-btn.active.doar { color: var(--secundaria); }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.85rem; color: #546e7a; }
        input { 
            width: 100%; padding: 14px; border: 2px solid #eceff1; 
            border-radius: 12px; box-sizing: border-box; font-size: 1rem;
        }

        .btn-submit { 
            width: 100%; padding: 16px; border: none; border-radius: 15px; 
            color: white; font-weight: bold; font-size: 1rem; cursor: pointer; 
            background: linear-gradient(to bottom right, var(--primaria), var(--primaria-dark));
            box-shadow: 0 5px 15px rgba(0, 172, 193, 0.3);
            transition: 0.3s;
        }
        .btn-submit:hover { transform: translateY(-2px); }
        .btn-verde { background: linear-gradient(to bottom right, var(--secundaria), #2e7d32); }

        .hidden { display: none; }
        
        .link-alt { 
            text-align: center; margin-top: 15px; font-size: 0.9rem; 
            color: var(--primaria); cursor: pointer; font-weight: 500;
        }
        .link-esqueci {
            display: block; text-align: center; margin-top: 15px;
            font-size: 0.8rem; color: #90a4ae; text-decoration: none;
        }

        footer { padding: 40px 5%; text-align: center; background: #fcfcfc; border-top: 1px solid #eee; }
    </style>
</head>
<body>

<header>
    <div class="logo"><span>🐾</span> FarmacuraPet</div>
    <div id="usuarioInfo" style="font-weight: 500; font-size: 0.85rem;"></div>
</header>

<section class="hero">
    <h1>Amor em forma de remédio</h1>
    <p>Conectamos quem tem medicamentos sobrando com pets que precisam de cura.</p>
</section>

<div class="main-container">
    
    <div id="secao-acesso">
        <h2 style="text-align:center; margin-top: 0;">Bem-vindo</h2>
        <div class="form-group">
            <label>E-mail</label>
            <input type="email" id="acessoEmail" placeholder="exemplo@email.com">
        </div>
        <div class="form-group">
            <label>Senha</label>
            <input type="password" id="acessoSenha" placeholder="Sua senha">
        </div>
        <button class="btn-submit" onclick="realizarLogin()">Entrar no Sistema</button>
        <button class="btn-submit btn-verde hidden" id="btnCadastrar" onclick="realizarCadastroUsuario()">Criar minha Conta</button>
        
        <p class="link-alt" onclick="alternarTela()">Ainda não tem conta? Cadastre-se</p>
        <a href="javascript:void(0)" class="link-esqueci" onclick="recuperarSenha()">Esqueci minha senha</a>
    </div>

    <div id="secao-app" class="hidden">
        <div class="tabs">
            <button id="btnTabDoar" class="tab-btn active doar" onclick="mudarTipo('DOADOR')">Vou Doar</button>
            <button id="btnTabReceber" class="tab-btn" onclick="mudarTipo('Preciso')">Vou Pedir</button>
        </div>

        <form id="formUnico">
            <div class="form-group">
                <label>Seu Nome</label>
                <input type="text" id="nome" placeholder="Como quer ser chamado?">
            </div>
            
            <div class="ad-banner">
                <span>ANÚNCIO PARCEIRO</span>
            </div>

            <div class="form-group">
                <label>WhatsApp</label>
                <input type="tel" id="contato" placeholder="(00) 00000-0000">
            </div>
            <div class="form-group">
                <label>Nome do Medicamento</label>
                <input type="text" id="medicamento" placeholder="Ex: Simparic, Apoquel...">
            </div>
            <div class="form-group">
                <label id="labelData">Data de Validade</label>
                <input type="date" id="data">
            </div>

            <button type="button" id="btnFinalizar" class="btn-submit btn-verde" onclick="processar()">Salvar Agora</button>
            
            <p class="link-alt" style="color:#ff5252;" onclick="location.reload()">Sair da conta</p>
        </form>
    </div>
</div>

<footer>
    <div class="ad-banner" style="max-width: 500px; margin: 0 auto 30px; min-height: 100px;">
        <span>PUBLICIDADE</span>
    </div>
    <p><strong>FarmacuraPet 🐾</strong></p>
    <p style="font-size: 0.8rem; color: #90a4ae;">&copy; 2026 - Conectando corações e curas.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SB_URL = "https://tkupfowbgykjjdkwfiyr.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrdXBmb3diZ3lrampka3dmaXlyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNjY1OTgsImV4cCI6MjA5MTk0MjU5OH0.yXCbccFrPB9qyVamthjAUdyrK0bqWfbRCG3LR4VAjBY";
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    let tipo = 'DOADOR';
    let modoCadastro = false;

    function alternarTela() {
        modoCadastro = !modoCadastro;
        const btnLogin = document.querySelector('#secao-acesso button:not(.btn-verde)');
        const btnCad = document.getElementById('btnCadastrar');
        const link = document.querySelector('.link-alt');
        const esqueci = document.querySelector('.link-esqueci');
        
        if(modoCadastro) {
            btnCad.classList.remove('hidden');
            btnLogin.classList.add('hidden');
            esqueci.classList.add('hidden');
            link.innerText = "Já sou cadastrado";
        } else {
            btnCad.classList.add('hidden');
            btnLogin.classList.remove('hidden');
            esqueci.classList.remove('hidden');
            link.innerText = "Ainda não tem conta? Cadastre-se";
        }
    }

    async function realizarLogin() {
        const email = document.getElementById('acessoEmail').value;
        const password = document.getElementById('acessoSenha').value;
        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
        if (error) alert("Erro: E-mail ou senha inválidos.");
        else {
            document.getElementById('secao-acesso').classList.add('hidden');
            document.getElementById('secao-app').classList.remove('hidden');
            document.getElementById('usuarioInfo').innerText = "Olá, " + data.user.email.split('@')[0];
        }
    }

    async function realizarCadastroUsuario() {
        const email = document.getElementById('acessoEmail').value;
        const password = document.getElementById('acessoSenha').value;
        const { error } = await supabaseClient.auth.signUp({ email, password });
        if (error) alert("Erro ao cadastrar: " + error.message);
        else alert("Cadastro realizado! Verifique sua caixa de entrada.");
    }

    async function recuperarSenha() {
        const email = document.getElementById('acessoEmail').value;
        if (!email) return alert("Por favor, digite seu e-mail acima para receber o link de recuperação.");
        const { error } = await supabaseClient.auth.resetPasswordForEmail(email, { redirectTo: window.location.href });
        if (error) alert("Erro ao enviar e-mail.");
        else alert("Link de recuperação enviado! Verifique seu e-mail.");
    }

    function mudarTipo(t) {
        tipo = t;
        const btnD = document.getElementById('btnTabDoar');
