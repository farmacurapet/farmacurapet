<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Farmácia Veterinária Solidária</title>

<style>
body {
    font-family: 'Segoe UI', Arial, sans-serif;
    margin: 0;
    background: linear-gradient(135deg, #e8f5e9, #ffffff);
    overflow-x: hidden;
}

.fundo {
    position: fixed;
    width: 100%;
    height: 100%;
    background-image: url('https://cdn-icons-png.flaticon.com/512/616/616408.png'),
                      url('https://cdn-icons-png.flaticon.com/512/616/616430.png');
    background-repeat: no-repeat, no-repeat;
    background-position: left bottom, right bottom;
    background-size: 180px, 180px;
    opacity: 0.08;
    z-index: 0;
}

.header {
    background: #2e7d32;
    color: white;
    text-align: center;
    padding: 15px;
    font-size: 22px;
    font-weight: bold;
    position: relative;
    z-index: 1;
}

.container {
    width: 90%;
    max-width: 420px;
    margin: auto;
    background: rgba(255,255,255,0.95);
    padding: 25px;
    margin-top: 30px;
    border-radius: 15px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    position: relative;
    z-index: 1;
}

h2, h3 {
    text-align: center;
    color: #2e7d32;
}

input, select, textarea {
    width: 100%;
    margin: 8px 0;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

input:focus, textarea:focus, select:focus {
    border-color: #2e7d32;
    outline: none;
    box-shadow: 0 0 5px rgba(46,125,50,0.3);
}

button {
    width: 100%;
    margin-top: 10px;
    padding: 12px;
    background: linear-gradient(135deg, #43a047, #2e7d32);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

button:hover {
    background: linear-gradient(135deg, #2e7d32, #1b5e20);
    transform: scale(1.03);
}

a {
    color: #2e7d32;
    text-decoration: none;
    font-weight: bold;
}

.erro {
    color: red;
    text-align: center;
}

#areaDoador, #areaReceptor {
    background: #f9f9f9;
    padding: 15px;
    border-radius: 10px;
    margin-top: 10px;
}

.banner {
    background: linear-gradient(135deg, #66bb6a, #43a047);
    color: white;
    text-align: center;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 15px;
    font-weight: bold;
}

.ads {
    background: linear-gradient(135deg, #c8e6c9, #a5d6a7);
    text-align: center;
    padding: 10px;
    margin-top: 20px;
    border-radius: 10px;
}
</style>

</head>

<body>

<div class="fundo"></div>

<div class="header">
Farmácia Veterinária Solidária 🐾
</div>

<div class="container" id="loginDiv">
<div class="banner">
🐶 Campanha de Vacinação Gratuita este mês!
</div>

<h2>Login</h2>
<input type="email" id="email" placeholder="Email">
<input type="password" id="senha" placeholder="Senha">
<button onclick="login()">Entrar</button>
<p class="erro" id="erroLogin"></p>
<p><a href="#" onclick="mostrarCadastro()">Criar conta</a></p>
<p><a href="#" onclick="esqueciSenha()">Esqueci a senha</a></p>
</div>

<div class="container" id="cadastroDiv" style="display:none;">
<div class="banner">
🐱 Doe medicamentos e ajude vidas!
</div>

<h2>Cadastro</h2>
<input type="email" id="novoEmail" placeholder="Email">
<input type="password" id="novaSenha" placeholder="Senha">
<select id="tipoUsuario">
<option value="doador">Doador</option>
<option value="receptor">Receptor</option>
</select>
<button onclick="cadastrar()">Cadastrar</button>
<p class="erro" id="erroCadastro"></p>
<button onclick="voltarLogin()">Voltar</button>
</div>

<div class="container" id="sistemaDiv" style="display:none;">
<div class="banner">
💚 Ajude um pet hoje mesmo!
</div>

<h2>Sistema</h2>

<div id="areaDoador" style="display:none;">
<h3>Doar Medicamento</h3>
<input type="text" id="nomeMed" placeholder="Nome do medicamento">
<input type="date" id="dataValidade">
<input type="file" id="fotoMed">
<button onclick="doar()">Enviar Doação</button>
</div>

<div id="areaReceptor" style="display:none;">
<h3>Solicitar Medicamento</h3>
<textarea id="justificativa" placeholder="Justificativa"></textarea>
<input type="file" id="fotoReceita">
<button onclick="solicitar()">Enviar Solicitação</button>
</div>

<button onclick="logout()">Sair</button>

<div class="ads">
<a id="linkAd" href="#" target="_blank">
<img id="imgAd" src="" style="width:100%; border-radius:10px;">
</a>
</div>

</div>

<script>
let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];

function mostrarCadastro() {
    loginDiv.style.display = "none";
    cadastroDiv.style.display = "block";
}

function voltarLogin() {
    cadastroDiv.style.display = "none";
    loginDiv.style.display = "block";
}

function cadastrar() {
    let email = novoEmail.value;
    let senha = novaSenha.value;
    let tipo = tipoUsuario.value;

    if (!email || !senha) {
        erroCadastro.innerText = "Preencha todos os campos!";
        return;
    }

    usuarios.push({email, senha, tipo});
    localStorage.setItem("usuarios", JSON.stringify(usuarios));

    alert("Cadastro realizado com sucesso!");
    voltarLogin();
}

function login() {
    let email = document.getElementById("email").value;
    let senha = document.getElementById("senha").value;

    let user = usuarios.find(u => u.email === email && u.senha === senha);

    if (!user) {
        erroLogin.innerText = "Email ou senha incorretos!";
        return;
    }

    loginDiv.style.display = "none";
    sistemaDiv.style.display = "block";

    if (user.tipo === "doador") {
        areaDoador.style.display = "block";
    } else {
        areaReceptor.style.display = "block";
    }
}

function esqueciSenha() {
    let email = prompt("Digite seu email:");
    let user = usuarios.find(u => u.email === email);

    if (!user) {
        alert("Email não encontrado!");
    } else {
        alert("Sua senha é: " + user.senha);
    }
}

function doar() {
    let nome = nomeMed.value;
    let data = dataValidade.value;
    let foto = fotoMed.files[0];

    if (!nome || !data || !foto) {
        alert("Preencha todos os campos da doação!");
        return;
    }

    alert("Doação enviada com sucesso!");
}

function solicitar() {
    let just = justificativa.value;
    let foto = fotoReceita.files[0];

    if (!just || !foto) {
        alert("Envie justificativa e foto da receita!");
        return;
    }

    alert("Solicitação enviada!");
}

function logout() {
    location.reload();
}

let anuncios = [
    {
        imagem: "https://upload.wikimedia.org/wikipedia/commons/0/0e/Shopee_logo.svg",
        link: "https://shopee.com.br"
    },
    {
        imagem: "https://upload.wikimedia.org/wikipedia/commons/7/75/Netflix_icon.svg",
        link: "https://netflix.com"
    },
    {
        imagem: "https://upload.wikimedia.org/wikipedia/commons/5/5c/MercadoLibre.svg",
        link: "https://mercadolivre.com.br"
    }
];

let indexAd = 0;

function trocarAnuncio() {
    document.getElementById("imgAd").src = anuncios[indexAd].imagem;
    document.getElementById("linkAd").href = anuncios[indexAd].link;

    indexAd = (indexAd + 1) % anuncios.length;
}

setInterval(trocarAnuncio, 3000);
trocarAnuncio();
</script>

</body>
</html>
