<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farmácia Veterinária Solidária</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

/* Fundo leve */
body::after {
    content: "🐾";
    position: fixed;
    font-size: 80px;
    opacity: 0.05;
    bottom: 10%;
    right: 10%;
}

/* Card */
.card {
    background: white;
    width: 90%;
    max-width: 380px;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0px 5px 20px rgba(0,0,0,0.3);
}

/* Títulos */
h2 {
    text-align: center;
}

/* Inputs */
label {
    font-weight: bold;
    display: block;
    margin-top: 10px;
}

input, select {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 8px;
    border: 1px solid #ccc;
    box-sizing: border-box;
}

/* Senha */
.input-group {
    position: relative;
}

.input-group span {
    position: absolute;
    right: 10px;
    top: 35px;
    cursor: pointer;
}

/* Botões */
button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border: none;
    border-radius: 8px;
    background: #2a5298;
    color: white;
    font-weight: bold;
}

/* Sistema */
#sistemaDiv {
    width: 100%;
    max-width: 500px;
    padding: 10px;
}

.item {
    background: white;
    padding: 10px;
    margin: 10px 0;
    border-radius: 10px;
    text-align: center;
}

.item img {
    width: 120px;
    margin-top: 10px;
    border-radius: 8px;
}

/* Preview */
#preview {
    width: 120px;
    margin-top: 10px;
    display: none;
}

/* Responsivo */
@media (max-width:500px){
    .card { max-width: 95%; }
    .item img, #preview { width: 100px; }
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginDiv" class="card">
<h2>Login 🐾</h2>

<label>Email</label>
<input type="email" id="email">

<label>Senha</label>
<div class="input-group">
<input type="password" id="senha">
<span onclick="toggleSenha('senha')">👁️</span>
</div>

<button onclick="login()">Entrar</button>
<button onclick="mostrarCadastro()">Criar conta</button>
</div>

<!-- CADASTRO -->
<div id="cadastroDiv" class="card" style="display:none;">
<h2>Cadastro</h2>

<label>Email</label>
<input type="email" id="novoEmail">

<label>Senha</label>
<div class="input-group">
<input type="password" id="novaSenha">
<span onclick="toggleSenha('novaSenha')">👁️</span>
</div>

<label>WhatsApp</label>
<input type="text" id="whatsapp">

<select id="tipoUsuario">
<option value="doador">Doador</option>
<option value="receptor">Receptor</option>
</select>

<button onclick="cadastrar()">Cadastrar</button>
<button onclick="voltarLogin()">Voltar</button>
</div>

<!-- SISTEMA -->
<div id="sistemaDiv" style="display:none;">

<h2 style="color:white; text-align:center;">Medicamentos Disponíveis</h2>
<div id="listaEstoque"></div>

<h2 style="color:white; text-align:center;">Solicitações</h2>
<div id="listaSolicitacoes"></div>

<div id="areaDoador" style="display:none;">
<div class="card">

<h3>Adicionar Medicamento</h3>

<label>Nome</label>
<input type="text" id="nomeMed">

<label>Validade</label>
<input type="date" id="dataValidade">

<label>Foto do medicamento</label>
<input type="file" id="fotoMed" accept="image/*" capture="environment" onchange="previewImagem(event)">

<img id="preview">

<button onclick="doar()">Salvar</button>

</div>
</div>

<button onclick="logout()">Sair</button>

</div>

<script>
let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];
let estoque = JSON.parse(localStorage.getItem("estoque")) || [];
let solicitacoes = JSON.parse(localStorage.getItem("solicitacoes")) || [];

let usuarioLogado = null;

/* Mostrar senha */
function toggleSenha(id){
    let c=document.getElementById(id);
    c.type = c.type==="password" ? "text" : "password";
}

/* Preview imagem */
function previewImagem(event){
    let img = document.getElementById("preview");
    img.src = URL.createObjectURL(event.target.files[0]);
    img.style.display = "block";
}

/* Login */
function login(){
    let user = usuarios.find(u => u.email===email.value && u.senha===senha.value);

    if(!user){
        alert("Erro no login");
        return;
    }

    usuarioLogado = user;

    loginDiv.style.display="none";
    sistemaDiv.style.display="block";

    carregarSistema();
}

/* Cadastro */
function cadastrar(){
    usuarios.push({
        email:novoEmail.value,
        senha:novaSenha.value,
        zap:whatsapp.value,
        tipo:tipoUsuario.value
    });

    localStorage.setItem("usuarios", JSON.stringify(usuarios));
    alert("Cadastrado!");
    voltarLogin();
}

/* Sistema */
function carregarSistema(){
    atualizarEstoque();
    atualizarSolicitacoes();

    if(usuarioLogado.tipo==="doador"){
        areaDoador.style.display="block";
    }
}

/* Doar */
function doar(){
    let file = fotoMed.files[0];
    if(!file) return alert("Envie uma foto");

    let reader = new FileReader();

    reader.onload = function(e){
        estoque.push({
            id: Date.now(),
            nome: nomeMed.value,
            data: dataValidade.value,
            foto: e.target.result,
            doador: usuarioLogado.email
        });

        localStorage.setItem("estoque", JSON.stringify(estoque));
        atualizarEstoque();
    };

    reader.readAsDataURL(file);
}

/* Atualizar estoque */
function atualizarEstoque(){
    listaEstoque.innerHTML="";

    estoque.forEach(m=>{
        listaEstoque.innerHTML+=`
        <div class="item">
            <b>${m.nome}</b><br>
            Validade: ${m.data}
            <img src="${m.foto}">
            <button onclick="interesse(${m.id})">Quero esse</button>
        </div>`;
    });
}

/* Interesse */
function interesse(id){
    solicitacoes.push({
        medId:id,
        receptor:usuarioLogado.email,
        status:"pendente"
    });

    localStorage.setItem("solicitacoes", JSON.stringify(solicitacoes));
    atualizarSolicitacoes();
}

/* Solicitações */
function atualizarSolicitacoes(){
    listaSolicitacoes.innerHTML="";

    solicitacoes.forEach(s=>{
        let med = estoque.find(m=>m.id===s.medId);

        if(med && med.doador===usuarioLogado.email && s.status==="pendente"){
            listaSolicitacoes.innerHTML+=`
            <div class="item">
                ${s.receptor} quer ${med.nome}
                <button onclick="confirmar(${s.medId})">Confirmar</button>
            </div>`;
        }
    });
}

/* Confirmar doação */
function confirmar(id){
    estoque = estoque.filter(m=>m.id!==id);

    solicitacoes = solicitacoes.map(s=>{
        if(s.medId===id) s.status="concluido";
        return s;
    });

    localStorage.setItem("estoque", JSON.stringify(estoque));
    localStorage.setItem("solicitacoes", JSON.stringify(solicitacoes));

    atualizarEstoque();
    atualizarSolicitacoes();

    alert("Medicamento doado!");
}

/* Logout */
function logout(){
    location.reload();
}

/* Navegação */
function mostrarCadastro(){
    loginDiv.style.display="none";
    cadastroDiv.style.display="block";
}

function voltarLogin(){
    cadastroDiv.style.display="none";
    loginDiv.style.display="block";
}
</script>

</body>
</html>
