<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmacura Pet - Painel Administrativo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #1e3c72;
            --accent: #28a745;
            --danger: #d32f2f;
            --side-bg: #ffffff;
            --body-bg: #f4f7f6;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body { 
            background-color: var(--body-bg); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
        }

        .card-admin {
            background: var(--side-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }

        h2 { color: var(--primary); margin-bottom: 1.5rem; text-align: center; }

        .form-group { margin-bottom: 1rem; position: relative; }

        label { display: block; margin-bottom: 5px; color: #555; font-size: 0.9rem; }

        input {
            width: 100%;
            padding: 12px;
            padding-right: 40px; /* Espaço para o olhinho */
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
            transition: border 0.3s;
        }

        input:focus { border-color: var(--primary); }

        /* Estilização do Olhinho */
        .toggle-password {
            position: absolute;
            right: 12px;
            top: 35px;
            cursor: pointer;
            color: #888;
            transition: color 0.3s;
        }

        .toggle-password:hover { color: var(--primary); }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 1rem;
        }

        .btn-submit:hover { opacity: 0.9; }

        .status-msg {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.85rem;
            display: none;
        }
    </style>
</head>
<body>

<div class="card-admin">
    <h2><i class="fas fa-paw"></i> Farmacura Pet</h2>
    
    <form id="adminForm">
        <div class="form-group">
            <label>E-mail de Acesso</label>
            <input type="email" id="email" placeholder="seu@email.com" required>
        </div>

        <div class="form-group">
            <label>Senha</label>
            <input type="password" id="password" placeholder="Sua senha" required>
            <i class="fa-solid fa-eye toggle-password" id="eye"></i>
        </div>

        <button type="submit" class="btn-submit">SALVAR / ATUALIZAR</button>
    </form>
    
    <div id="msg" class="status-msg"></div>
</div>

<script>
    const emailInput = document.getElementById('email');
    const passInput = document.getElementById('password');
    const eyeIcon = document.getElementById('eye');
    const form = document.getElementById('adminForm');
    const msg = document.getElementById('msg');

    // 1. LÓGICA DO OLHINHO
    eyeIcon.addEventListener('click', () => {
        const isPassword = passInput.type === 'password';
        passInput.type = isPassword ? 'text' : 'password';
        
        // Troca o ícone
        eyeIcon.classList.toggle('fa-eye');
        eyeIcon.classList.toggle('fa-eye-slash');
    });

    // 2. CARREGAR DADOS AUTOMATICAMENTE (Persistência no navegador)
    window.addEventListener('DOMContentLoaded', () => {
        const savedEmail = localStorage.getItem('pet_admin_email');
        const savedPass = localStorage.getItem('pet_admin_pass');

        if (savedEmail && savedPass) {
            emailInput.value = savedEmail;
            passInput.value = savedPass;
            console.log("Dados carregados do cache local.");
        }
    });

    // 3. SALVAR / ATUALIZAR CADASTRO
    form.addEventListener('submit', (e) => {
        e.preventDefault();

        // Salva no LocalStorage do navegador
        localStorage.setItem('pet_admin_email', emailInput.value);
        localStorage.setItem('pet_admin_pass', passInput.value);

        // Feedback visual
        msg.style.display = 'block';
        msg.style.color = 'var(--accent)';
        msg.innerText = "Cadastro atualizado com sucesso!";

        setTimeout(() => { msg.style.display = 'none'; }, 3000);
    });
</script>

</body>
</html>
