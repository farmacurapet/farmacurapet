<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FarmacuraPet - Conectando Doações</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --primary: #2ecc71; --secondary: #3498db; --dark: #2c3e50; --light: #f4f7f6; }
        body { font-family: 'Poppins', sans-serif; margin: 0; display: flex; background: var(--light); height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        nav { width: 260px; background: var(--dark); color: white; padding: 20px; display: flex; flex-direction: column; }
        nav a { color: white; text-decoration: none; padding: 12px; display: block; border-radius: 8px; margin-bottom: 5px; }
        nav a:hover { background: #3e4f5f; }

        /* Main Content */
        main { flex: 1; padding: 30px; overflow-y: auto; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        /* Auth Styles */
        .auth-container { max-width: 400px; margin: 50px auto; }
        .password-wrapper { position: relative; }
        .password-wrapper i { position: absolute; right: 15px; top: 18px; cursor: pointer; color: #777; }
        
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--primary); border: none; color: white; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        
        /* Entertainment Section */
        .iframe-container { width: 100%; height: 500px; border-radius: 12px; border: none; background: #eee; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <nav id="sidebar" class="hidden">
        <h2 style="color: var(--primary);">FarmacuraPet</h2>
        <a href="#" onclick="showSection('section-doar')"><i class="fas fa-plus"></i> Doar</a>
        <a href="#" onclick="showSection('section-estoque')"><i class="fas fa-pills"></i> Estoque</a>
        <a href="#" onclick="showSection('section-lazer')"><i class="fas fa-gamepad"></i> Jogos & Mídias</a>
        <a href="#" onclick="logout()" style="margin-top: 50px; color: #e74c3c;"><i class="fas fa-sign-out-alt"></i> Sair</a>
    </nav>

    <main>
        <div id="auth-screen" class="auth-container card">
            <h2 id="auth-title">Login</h2>
            <input type="email" id="email" placeholder="Seu E-mail">
            
            <div class="password-wrapper">
                <input type="password" id="password" placeholder="Sua Senha">
                <i class="fas fa-eye" id="togglePassword" onclick="togglePass()"></i>
            </div>

            <div id="register-fields" class="hidden">
                <input type="text" id="whatsapp" placeholder="Seu WhatsApp (DDD + Número)">
                <input type="text" id="user_name" placeholder="Nome Completo">
            </div>

            <button id="btn-auth" onclick="handleAuth()">Entrar</button>
            <p style="text-align: center; cursor: pointer; font-size: 0.9rem;" onclick="toggleAuthMode()" id="auth-switch">
                Não tem conta? Cadastre-se
            </p>
        </div>

        <section id="section-doar" class="hidden">
            <div class="card">
                <h3>Cadastrar Doação</h3>
                <input type="text" id="med_nome" placeholder="Nome do Medicamento">
                <input type="date" id="med_validade">
                <input type="number" id="med_qtd" placeholder="Quantidade">
                <button onclick="salvarMedicamento()">Confirmar e Publicar</button>
            </div>
        </section>

        <section id="section-estoque" class="hidden">
            <div class="card">
                <h3>Medicamentos Disponíveis</h3>
                <div id="lista-medicamentos"></div>
            </div>
        </section>

        <section id="section-lazer" class="hidden">
            <div class="card">
                <h3>Espaço Lazer & Social</h3>
                <div style="margin-bottom: 15px;">
                    <button onclick="changeIframe('https://www.jogos360.com.br')" style="width: auto; background: var(--secondary);">Jogos 360</button>
                    <button onclick="changeIframe('https://www.youtube.com')" style="width: auto; background: #ff0000;">YouTube</button>
                    <button onclick="changeIframe('https://www.facebook.com')" style="width: auto; background: #3b5998;">Facebook</button>
                </div>
                <iframe src="https://www.jogos360.com.br" id="iframe-lazer" class="iframe-container"></iframe>
            </div>
        </section>
    </main>

    <script>
        const supabaseUrl = 'https://tkupfowbgylkjdkwfiyr.supabase.co';
        const supabaseKey = 'SUA_CHAVE_ANON_AQUI'; // Coloque sua anon key aqui
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let isRegisterMode = false;

        // 1. Alternar Visibilidade da Senha (Olhinho)
        function togglePass() {
            const passInput = document.getElementById('password');
            const icon = document.getElementById('togglePassword');
            if (passInput.type === "password") {
                passInput.type = "text";
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                passInput.type = "password";
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        // 2. Alternar entre Login e Cadastro
        function toggleAuthMode() {
            isRegisterMode = !isRegisterMode;
            document.getElementById('register-fields').classList.toggle('hidden');
            document.getElementById('auth-title').innerText = isRegisterMode ? 'Cadastro' : 'Login';
            document.getElementById('btn-auth').innerText = isRegisterMode ? 'Criar Conta' : 'Entrar';
            document.getElementById('auth-switch').innerText = isRegisterMode ? 'Já tem conta? Faça Login' : 'Não tem conta? Cadastre-se';
        }

        // 3. Lógica de Autenticação
        async function handleAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const whatsapp = document.getElementById('whatsapp').value;

            if (isRegisterMode) {
                const { data, error } = await _supabase.auth.signUp({
                    email, password, options: { data: { whatsapp: whatsapp } }
                });
                if (error) alert(error.message);
                else alert("Cadastro realizado! Verifique seu e-mail.");
            } else {
                const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
                if (error) alert(error.message);
                else loginSuccess();
            }
        }

        function loginSuccess() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('sidebar').classList.remove('hidden');
            showSection('section-doar');
            carregarEstoque();
        }

        // 4. Salvar Medicamento
        async function salvarMedicamento() {
            const { data: { user } } = await _supabase.auth.getUser();
            const nome = document.getElementById('med_nome').value;
            const validade = document.getElementById('med_validade').value;
            const qtd = document.getElementById('med_qtd').value;

            const { error } = await _supabase.from('medicamentos').insert([
                { nome_medicamento: nome, data_validade: validade, quantidade: qtd, doador_id: user.id }
            ]);

            if (!error) {
                alert("Medicamento cadastrado!");
                document.getElementById('med_nome').value = ""; // Limpa campo
                showSection('section-estoque');
                carregarEstoque();
            }
        }

        // 5. Confirmar Doação (Faz o medicamento sair da tela)
        async function confirmarDoacao(id) {
            const { error } = await _supabase.from('medicamentos').update({ status: 'doado' }).eq('id', id);
            if (!error) {
                alert("Doação confirmada! O item sairá do estoque virtual.");
                carregarEstoque();
            }
        }

        // 6. Funções de Interface
        function showSection(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function changeIframe(url) {
            document.getElementById('iframe-lazer').src = url;
        }

        async function carregarEstoque() {
            const { data } = await _supabase.from('medicamentos').select('*').eq('status', 'disponivel');
            const container = document.getElementById('lista-medicamentos');
            container.innerHTML = data.map(m => `
                <div class="card" style="border: 1px solid #eee;">
                    <strong>${m.nome_medicamento}</strong> (${m.quantidade} unidades)<br>
                    <small>Validade: ${m.data_validade}</small><br>
                    <button onclick="confirmarDoacao('${m.id}')" style="background: #3498db; padding: 5px; font-size: 0.8rem;">Confirmar Recebimento</button>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
