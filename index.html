<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FarmacuraPet - Conectando Doações</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --primary: #2ecc71; --secondary: #3498db; --dark: #2c3e50; --light: #f4f7f6; }
        body { font-family: 'Poppins', sans-serif; margin: 0; display: flex; background: var(--light); height: 100vh; }
        
        /* Sidebar */
        nav { width: 260px; background: var(--dark); color: white; padding: 20px; display: flex; flex-direction: column; }
        nav h2 { color: var(--primary); margin-bottom: 30px; }
        nav a { color: white; text-decoration: none; padding: 12px; display: block; border-radius: 8px; margin-bottom: 5px; cursor: pointer; }
        nav a:hover { background: #3e4f5f; }

        /* Main Content */
        main { flex: 1; padding: 30px; overflow-y: auto; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--primary); border: none; color: white; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        
        .hidden { display: none; }
        .iframe-container { width: 100%; height: 500px; border-radius: 12px; border: 2px solid var(--dark); margin-top: 10px; }
        
        .social-links { margin-top: auto; padding-top: 20px; border-top: 1px solid #3e4f5f; }
        .social-links a { font-size: 0.9rem; }
    </style>
</head>
<body>

    <nav>
        <h2>FarmacuraPet</h2>
        <a onclick="showSection('section-doar')"><i class="fas fa-plus"></i> Doar Agora</a>
        <a onclick="showSection('section-estoque')"><i class="fas fa-pills"></i> Ver Estoque</a>
        <a onclick="showSection('section-lazer')"><i class="fas fa-gamepad"></i> Lazer & Redes</a>
        
        <div class="social-links">
            <a href="https://instagram.com" target="_blank"><i class="fab fa-instagram"></i> Instagram</a>
            <a href="https://facebook.com" target="_blank"><i class="fab fa-facebook"></i> Facebook</a>
            <a href="https://youtube.com" target="_blank"><i class="fab fa-youtube"></i> YouTube</a>
        </div>
    </nav>

    <main>
        <section id="section-doar">
            <div class="card">
                <h3><i class="fas fa-hand-holding-medical"></i> Cadastrar Doação</h3>
                <p style="font-size: 0.8rem; color: #666;">Não precisa de conta. Preencha os dados abaixo:</p>
                
                <input type="text" id="med_nome" placeholder="Nome do Medicamento">
                <input type="text" id="med_whatsapp" placeholder="Seu WhatsApp (Ex: 81988887777)">
                <label>Data de Validade:</label>
                <input type="date" id="med_validade">
                <input type="number" id="med_qtd" placeholder="Quantidade">
                
                <button onclick="salvarSemLogin()">Publicar Doação</button>
            </div>
        </section>

        <section id="section-estoque" class="hidden">
            <div class="card">
                <h3><i class="fas fa-boxes"></i> Medicamentos Disponíveis</h3>
                <div id="lista-medicamentos">Carregando estoque...</div>
            </div>
        </section>

        <section id="section-lazer" class="hidden">
            <div class="card">
                <h3>Espaço Interativo</h3>
                <div style="display: flex; gap: 10px;">
                    <button onclick="changeIframe('https://www.jogos360.com.br')" style="background: #e67e22;">Jogos 360</button>
                    <button onclick="changeIframe('https://m.youtube.com')" style="background: #c0392b;">YouTube</button>
                </div>
                <iframe src="https://www.jogos360.com.br" id="iframe-lazer" class="iframe-container"></iframe>
            </div>
        </section>
    </main>

    <script>
        // Use a sua URL e Key do Supabase
        const supabaseUrl = 'https://tkupfowbgylkjdkwfiyr.supabase.co';
        const supabaseKey = 'SUA_CHAVE_ANON_AQUI'; 
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        // 1. Salvar sem login
        async function salvarSemLogin() {
            const nome = document.getElementById('med_nome').value;
            const zap = document.getElementById('med_whatsapp').value;
            const validade = document.getElementById('med_validade').value;
            const qtd = document.getElementById('med_qtd').value;

            if(!nome || !zap || !validade) return alert("Por favor, preencha todos os campos.");

            // Enviamos para a tabela 'medicamentos'
            // IMPORTANTE: Para isso funcionar sem login, o RLS no Supabase deve permitir INSERT para 'anon'
            const { error } = await _supabase.from('medicamentos').insert([
                { 
                    nome_medicamento: nome, 
                    data_validade: validade, 
                    quantidade: qtd, 
                    status: 'disponivel',
                    dosagem: zap // Usando o campo dosagem temporariamente para guardar o zap ou crie uma coluna 'whatsapp' no banco
                }
            ]);

            if (error) {
                alert("Erro ao publicar: " + error.message);
            } else {
                alert("Doação publicada com sucesso!");
                showSection('section-estoque');
                carregarEstoque();
            }
        }

        // 2. Confirmar Recebimento (Faz o item sair da tela)
        async function confirmarDoacao(id) {
            const { error } = await _supabase.from('medicamentos').update({ status: 'doado' }).eq('id', id);
            if (!error) {
                alert("O medicamento foi retirado do estoque virtual!");
                carregarEstoque();
            }
        }

        // 3. Funções de Interface
        function showSection(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function changeIframe(url) {
            document.getElementById('iframe-lazer').src = url;
        }

        async function carregarEstoque() {
            const { data } = await _supabase.from('medicamentos').select('*').eq('status', 'disponivel');
            const container = document.getElementById('lista-medicamentos');
            
            if(!data || data.length === 0) {
                container.innerHTML = "Nenhum medicamento disponível.";
                return;
            }

            container.innerHTML = data.map(m => `
                <div class="card" style="border-left: 5px solid var(--secondary);">
                    <strong>${m.nome_medicamento}</strong> - ${m.quantidade} unidades<br>
                    <small>Vencimento: ${m.data_validade}</small><br>
                    <a href="https://wa.me/${m.dosagem}" target="_blank" style="color: green; text-decoration: none; font-weight: bold;">
                        <i class="fab fa-whatsapp"></i> Falar com doador
                    </a><br>
                    <button onclick="confirmarDoacao('${m.id}')" style="background: var(--secondary); margin-top: 10px; font-size: 0.8rem; padding: 5px;">Confirmar Recebimento</button>
                </div>
            `).join('');
        }

        // Inicia carregando o estoque
        carregarEstoque();
    </script>
</body>
</html>
