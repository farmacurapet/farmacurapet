<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FarmacuraPet - Acesso Integrado</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; color: #333; background-color: #f4f9ff; }
        header { background-color: #2D9CDB; color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .container { max-width: 550px; margin: 20px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.08); }
        
        /* ESTILO DO ANÚNCIO / BANNER */
        .area-anuncio { 
            max-width: 550px; 
            margin: 20px auto; 
            background: #FFF9C4; /* Amarelo claro para destaque */
            border: 2px dashed #FBC02D; 
            border-radius: 10px; 
            padding: 15px; 
            display: flex; 
            align-items: center; 
            gap: 15px;
            cursor: pointer;
            transition: 0.3s;
        }
        .area-anuncio:hover { transform: scale(1.02); background: #FFF59D; }
        .anuncio-texto h4 { margin: 0; color: #f57f17; font-size: 0.9rem; }
        .anuncio-texto p { margin: 5px 0 0; font-size: 0.8rem; color: #555; }
        .anuncio-icone { font-size: 24px; }

        .tabs { display: flex; margin-bottom: 25px; background: #eee; border-radius: 30px; padding: 5px; }
        .tab-btn { flex: 1; border: none; padding: 12px; cursor: pointer; border-radius: 25px; font-weight: bold; background: none; color: #666; transition: 0.3s; }
        .tab-btn.active { background: #2D9CDB; color: white; }
        .tab-btn.active.doar { background: #27AE60; }
        h2 { text-align: center; color: #2D9CDB; margin-top: 0; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; font-size: 0.9rem; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        input:focus { border-color: #2D9CDB; outline: none; }
        .btn-submit { width: 100%; padding: 15px; border: none; border-radius: 25px; font-weight: bold; font-size: 1.1rem; cursor: pointer; transition: 0.3s; margin-top: 15px; color: white; }
        .bg-azul { background-color: #2D9CDB; }
        .bg-verde { background-color: #27AE60; }
        .hidden { display: none; }
        .perfil-usuario { font-size: 0.9rem; }
        .link-alternar { text-align: center; margin-top: 15px; font-size: 0.9rem; cursor: pointer; color: #2D9CDB; text-decoration: underline; }
    </style>
</head>
<body>

<header>
    <div class="logo"><strong>FarmacuraPet</strong></div>
    <div id="usuarioLogado" class="perfil-usuario"></div>
</header>

<div class="container">
    <div id="secao-acesso">
        <h2 id="tituloAcesso">Acesse sua Conta</h2>
        <div class="form-group">
            <label>E-mail</label>
            <input type="email" id="acessoEmail" placeholder="seu@email.com">
        </div>
        <div class="form-group">
            <label>Senha</label>
            <input type="password" id="acessoSenha" placeholder="mínimo 6 caracteres">
        </div>
        <button id="btnEntrar" class="btn-submit bg-azul" onclick="realizarLogin()">Entrar</button>
        <button id="btnCadastrar" class="btn-submit bg-verde hidden" onclick="realizarCadastroUsuario()">Criar Minha Conta</button>
        <div id="alternarAcesso" class="link-alternar" onclick="alternarTelaAcesso()">Não tem conta? Cadastre-se aqui</div>
    </div>

    <div id="secao-app" class="hidden">
        
        <div class="area-anuncio" onclick="window.open('https://www.google.com', '_blank')">
            <div class="anuncio-icone">📢</div>
            <div class="anuncio-texto">
                <h4>Espaço para Parceiros / Avisos</h4>
                <p>Anuncie aqui sua clínica ou pet shop parceiro da Farmacura!</p>
            </div>
        </div>

        <div class="tabs">
            <button id="btnTabDoar" class="tab-btn active doar" onclick="mudarTipo('DOADOR')">Quero Doar</button>
            <button id="btnTabReceber" class="tab-btn" onclick="mudarTipo('RECEBEDOR')">Preciso de Ajuda</button>
        </div>

        <h2 id="titulo">Cadastro de Doação</h2>

        <form id="formUnico">
            <div class="form-group">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" placeholder="Seu nome" required>
            </div>
            <div class="form-group">
                <label for="contato">Telefone / WhatsApp</label>
                <input type="tel" id="contato" placeholder="(81) 90000-0000" required>
            </div>
            <div class="form-group">
                <label for="medicamento">Medicamento</label>
                <input type="text" id="medicamento" placeholder="Nome do remédio" required>
            </div>
            <div class="form-group">
                <label for="quantidade">Quantidade (Unidades)</label>
                <input type="number" id="quantidade" placeholder="Ex: 20" required>
            </div>
            <div class="form-group" id="areaDinamica">
                <label id="labelDinamico" for="dataDinamica">Validade do Medicamento</label>
                <input type="date" id="dataDinamica" required>
            </div>
            <button type="button" id="btnAcao" class="btn-submit bg-verde" onclick="processarCadastro()">Finalizar Cadastro</button>
            <button type="button" style="background:none; border:none; color:red; cursor:pointer; width:100%; margin-top:10px;" onclick="logout()">Sair da conta</button>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SB_URL = "https://tkupfowbgykjjdkwfiyr.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrdXBmb3diZ3lrampka3dmaXlyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNjY1OTgsImV4cCI6MjA5MTk0MjU5OH0.yXCbccFrPB9qyVamthjAUdyrK0bqWfbRCG3LR4VAjBY";
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    let tipoAtual = 'DOADOR';
    let modoCadastro = false;

    function alternarTelaAcesso() {
        modoCadastro = !modoCadastro;
        const titulo = document.getElementById('tituloAcesso');
        const btnE = document.getElementById('btnEntrar');
        const btnC = document.getElementById('btnCadastrar');
        const link = document.getElementById('alternarAcesso');
        if (modoCadastro) {
            titulo.innerText = "Crie sua Conta";
            btnE.classList.add('hidden');
            btnC.classList.remove('hidden');
            link.innerText = "Já tem conta? Faça Login";
        } else {
            titulo.innerText = "Acesse sua Conta";
            btnE.classList.remove('hidden');
            btnC.classList.add('hidden');
            link.innerText = "Não tem conta? Cadastre-se aqui";
        }
    }

    async function realizarCadastroUsuario() {
        const email = document.getElementById('acessoEmail').value;
        const password = document.getElementById('acessoSenha').value;
        const { data, error } = await supabaseClient.auth.signUp({ email, password });
        if (error) alert("Erro ao cadastrar: " + error.message);
        else { alert("Conta criada! Já pode entrar."); alternarTelaAcesso(); }
    }

    async function realizarLogin() {
        const email = document.getElementById('acessoEmail').value;
        const password = document.getElementById('acessoSenha').value;
        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
        if (error) alert("Erro no login: " + error.message);
        else mostrarApp(data.user.email);
    }

    function mostrarApp(email) {
        document.getElementById('secao-acesso').classList.add('hidden');
        document.getElementById('secao-app').classList.remove('hidden');
        document.getElementById('usuarioLogado').innerText = "Olá, " + email;
    }

    function logout() { supabaseClient.auth.signOut(); location.reload(); }

    function mudarTipo(tipo) {
        tipoAtual = tipo;
        const btnD = document.getElementById('btnTabDoar');
        const btnR = document.getElementById('btnTabReceber');
        const titulo = document.getElementById('titulo');
        const label = document.getElementById('labelDinamico');
        const btnAcao = document.getElementById('btnAcao');
        btnD.classList.remove('active', 'doar');
        btnR.classList.remove('active', 'doar');
        if (tipo === 'DOADOR') {
            btnD.classList.add('active', 'doar');
            titulo.innerText = "Cadastro de Doação";
            label.innerText = "Validade do Medicamento";
            btnAcao.className = "btn-submit bg-verde";
            titulo.style.color = "#27AE60";
        } else {
            btnR.classList.add('active');
            titulo.innerText = "Solicitar Medicamento";
            label.innerText = "Validade da Receita";
            btnAcao.className = "btn-submit bg-azul";
            titulo.style.color = "#2D9CDB";
        }
    }

    async function processarCadastro() {
        const nomeUsuario = document.getElementById('nome').value;
        const zap = document.getElementById('contato').value;
        const remedio = document.getElementById('medicamento').value;
        const qtd = document.getElementById('quantidade').value;
        const dataVal = document.getElementById('dataDinamica').value;
        if (!nomeUsuario || !remedio || !dataVal) { alert("Preencha tudo!"); return; }
        const btnAcao = document.getElementById('btnAcao');
        btnAcao.innerText = "Enviando...";
        btnAcao.disabled = true;
        try {
            const { error } = await supabaseClient.from('registros').insert([{
                perfil: tipoAtual, nome: nomeUsuario, whatsapp: zap, medicamento: remedio, quantidade: parseInt(qtd), validade_data: dataVal
            }]);
            if (error) throw error;
            alert("✅ Registro salvo!");
            document.getElementById('formUnico').reset();
        } catch (error) { alert("Erro: " + error.message); }
        finally { btnAcao.innerText = "Finalizar Cadastro"; btnAcao.disabled = false; }
    }
</script>
</body>
</html>
