<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Farmácia Pet Solidária</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f8f7;
      margin: 0;
      padding: 0;
    }

    header {
      background: #2ecc71;
      color: white;
      padding: 15px;
      text-align: center;
    }

    main {
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }

    form {
      background: white;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    input, textarea, button {
      width: 100%;
      margin: 8px 0;
      padding: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      background: #2ecc71;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: #27ae60;
    }

    .card {
      background: white;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .delete {
      background: #e74c3c;
      margin-top: 10px;
    }

    footer {
      text-align: center;
      padding: 10px;
      font-size: 14px;
      color: #777;
    }
  </style>
</head>

<body>

<header>
  <h1>🐾 Farmácia Pet Solidária</h1>
  <p>Doe medicamentos e ajude animais!</p>
</header>

<main>

  <form id="form">
    <h2>Cadastrar medicamento</h2>
    <input type="text" id="nome" placeholder="Nome do medicamento" required>
    <input type="text" id="validade" placeholder="Validade (ex: 12/2026)" required>
    <textarea id="descricao" placeholder="Descrição"></textarea>
    <input type="text" id="contato" placeholder="Contato" required>
    <button type="submit">Cadastrar</button>
  </form>

  <h2>Medicamentos disponíveis</h2>
  <div id="lista"></div>

</main>

<footer>
  ⚠️ Consulte sempre um veterinário antes de usar qualquer medicamento
</footer>

<script>
  const form = document.getElementById('form');
  const lista = document.getElementById('lista');

  let medicamentos = JSON.parse(localStorage.getItem('medicamentos')) || [];

  function salvar() {
    localStorage.setItem('medicamentos', JSON.stringify(medicamentos));
  }

  function renderizar() {
    lista.innerHTML = "";

    medicamentos.forEach((med, index) => {
      const div = document.createElement('div');
      div.className = 'card';

      div.innerHTML = `
        <strong>${med.nome}</strong><br>
        Validade: ${med.validade}<br>
        ${med.descricao}<br>
        Contato: ${med.contato}
        <button class="delete" onclick="remover(${index})">Excluir</button>
      `;

      lista.appendChild(div);
    });
  }

  function remover(index) {
    medicamentos.splice(index, 1);
    salvar();
    renderizar();
  }

  form.addEventListener('submit', (e) => {
    e.preventDefault();

    const novo = {
      nome: document.getElementById('nome').value,
      validade: document.getElementById('validade').value,
      descricao: document.getElementById('descricao').value,
      contato: document.getElementById('contato').value
    };

    medicamentos.push(novo);
    salvar();
    renderizar();

    form.reset();
  });

  renderizar();
</script>

</body>
</html>
