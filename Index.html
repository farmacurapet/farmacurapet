<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmacia Solidaria Pet| Portal de Doações</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .bg-gradient-tupan { background: linear-gradient(135deg, #b22222 0%, #333 100%); }
        .card-hover:hover { transform: translateY(-5px); transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-gray-100 font-sans antialiased text-gray-900">

    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-md mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-black text-red-700 tracking-tighter uppercase">Farmacura<span class="text-gray-800">Pet</span></h1>
            <div class="flex gap-4 items-center">
                <span class="bg-red-100 text-red-700 text-[10px] font-bold px-2 py-1 rounded-full uppercase">Recife</span>
                <button class="text-gray-500"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg></button>
            </div>
        </div>
    </header>

    <div class="max-w-md mx-auto p-4">
        <div class="relative group">
            <input type="text" id="campo-busca" placeholder="Busca por medicamento ou acessório..." 
                class="w-full p-4 pl-12 bg-white border border-gray-200 rounded-2xl shadow-sm focus:ring-2 focus:ring-red-600 focus:outline-none transition-all">
            <svg class="w-6 h-6 text-gray-400 absolute left-4 top-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        </div>
    </div>

    <div class="max-w-md mx-auto px-4 mb-8">
        <div class="bg-gradient-tupan rounded-3xl p-8 text-white relative overflow-hidden h-44 flex items-center">
            <div class="z-10">
                <h2 class="text-4xl font-black italic leading-none uppercase">Ofertas</h2>
                <p class="text-sm font-medium mt-1 tracking-widest opacity-80 uppercase">Solidariedade Animal</p>
                <div class="mt-4 inline-block bg-white text-red-700 font-bold text-xs px-3 py-1 rounded-full uppercase">Itens Grátis</div>
            </div>
            <div class="absolute -right-8 -bottom-8 opacity-20 transform rotate-12">
                <svg class="w-40 h-40" fill="currentColor" viewBox="0 0 20 20"><path d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-11H9v2h2v2zm0-4H9V5h2v4z"></path></svg>
            </div>
        </div>
    </div>

    <main class="max-w-md mx-auto px-4 pb-20">
        <div class="flex justify-between items-end mb-4">
            <h3 class="font-bold text-xl text-gray-800">Disponíveis para Doação</h3>
            <span class="text-xs text-gray-500 font-medium">Ver todos</span>
        </div>
        
        <div id="grid-produtos" class="grid grid-cols-2 gap-4">
            <div class="col-span-2 text-center py-10 text-gray-400 animate-pulse font-medium">
                Sincronizando com o banco de dados...
            </div>
        </div>
    </main>

    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 py-3 px-8 flex justify-between items-center max-w-md mx-auto">
        <button class="text-red-700 flex flex-col items-center"><svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path></svg><span class="text-[10px] font-bold">Início</span></button>
        <button class="text-gray-400 flex flex-col items-center"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg><span class="text-[10px] font-bold">Doar</span></button>
        <button class="text-gray-400 flex flex-col items-center"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg><span class="text-[10px] font-bold">Perfil</span></button>
    </div>

    <script>
        // CONFIGURAÇÃO DO SUPABASE
        const SUPABASE_URL = 'https://SUA_URL_AQUI.supabase.co'; // SUBSTITUA POR SUA URL
        const SUPABASE_KEY = 'sb_publishable_gASBcQLW9iHCtIOQbuQoYw_s0h1C76k';
        
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function listarItens() {
            const { data, error } = await _supabase
                .from('itens_solidarios')
                .select('*')
                .eq('status', 'disponivel')
                .order('data_postagem', { ascending: false });

            if (error) {
                console.error('Erro ao buscar dados:', error);
                return;
            }

            const grid = document.getElementById('grid-produtos');
            grid.innerHTML = ''; 

            if(data.length === 0) {
                grid.innerHTML = '<p class="col-span-2 text-center text-gray-500 py-10 italic">Nenhum item disponível no momento.</p>';
                return;
            }

            data.forEach(item => {
                grid.innerHTML += `
                    <div class="bg-white rounded-2xl p-3 shadow-sm border border-gray-100 card-hover flex flex-col">
                        <div class="bg-gray-50 rounded-xl mb-3 flex items-center justify-center h-32 overflow-hidden">
                            <img src="${item.foto_url || 'https://via.placeholder.com/150'}" class="object-contain h-24 w-full">
                        </div>
                        <h4 class="text-xs font-bold text-gray-700 uppercase truncate">${item.nome_item}</h4>
                        <p class="text-[10px] text-gray-400 mt-1 line-clamp-1">${item.descricao || 'Sem descrição'}</p>
                        <div class="mt-3 flex items-center justify-between">
                            <span class="text-red-600 font-black text-xs">GRÁTIS</span>
                            <button class="bg
